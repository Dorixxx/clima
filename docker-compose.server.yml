services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-cli-proxy-api:latest}
    pull_policy: always
    container_name: cli-proxy-api
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DEPLOY: ${DEPLOY:-}
      WRITABLE_PATH: /CLIProxyAPI/data
      CLIPROXY_CONFIG_PATH: /CLIProxyAPI/config/config.yaml
      MANAGEMENT_PANEL_GITHUB_REPOSITORY: ${MANAGEMENT_PANEL_GITHUB_REPOSITORY:-}
      MANAGEMENT_BUNDLED_ASSET_MODE: ${MANAGEMENT_BUNDLED_ASSET_MODE:-replace}
      PGSTORE_DSN: ${PGSTORE_DSN:-}
      PGSTORE_SCHEMA: ${PGSTORE_SCHEMA:-}
      PGSTORE_LOCAL_PATH: ${PGSTORE_LOCAL_PATH:-}
      MYSQLSTORE_DSN: ${MYSQLSTORE_DSN:-}
      MYSQLSTORE_DATABASE: ${MYSQLSTORE_DATABASE:-}
      MYSQLSTORE_LOCAL_PATH: ${MYSQLSTORE_LOCAL_PATH:-}
    ports:
      - "${CLI_PROXY_PORT:-8317}:8317"
      - "${CLI_PROXY_AUTH_CALLBACK_PORT_1:-8085}:8085"
      - "${CLI_PROXY_AUTH_CALLBACK_PORT_2:-1455}:1455"
      - "${CLI_PROXY_AUTH_CALLBACK_PORT_3:-54545}:54545"
      - "${CLI_PROXY_AUTH_CALLBACK_PORT_4:-51121}:51121"
      - "${CLI_PROXY_AUTH_CALLBACK_PORT_5:-11451}:11451"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config}:/CLIProxyAPI/config
      - ${CLI_PROXY_DATA_PATH:-./data}:/CLIProxyAPI/data
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli-proxy-api
    restart: unless-stopped
