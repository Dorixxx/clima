name: release-management-ui

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload management.html to
        required: true

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mgmt-ui-temp/package-lock.json

      - name: Install dependencies
        working-directory: mgmt-ui-temp
        run: npm ci

      - name: Build management UI
        working-directory: mgmt-ui-temp
        run: npm run build
        env:
          VERSION: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Prepare release asset
        working-directory: mgmt-ui-temp
        run: |
          cp dist/index.html dist/management.html
          ls -lh dist/management.html

      - name: Upload management asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: gh release upload "${RELEASE_TAG}" mgmt-ui-temp/dist/management.html --clobber
